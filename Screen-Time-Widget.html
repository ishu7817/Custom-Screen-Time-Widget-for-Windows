<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Focus Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400&family=Montserrat:wght@700;800&display=swap" rel="stylesheet"/>  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

   body {
    width: 100vw;
    height: 100vh;

    background-image: url("./wallpaper.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
}

    .card {
      width: fit-content;
      height: 200px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* === IMAGE LAYER === */
    .bg-image {
      position: absolute;
      inset: 0;
      background-image: url('./widget.jpg'); 
      background-size: 100% auto;      /* Locks the zoom exactly to the width of the card */
      background-repeat: no-repeat;    /* Stops the image from tiling */
      background-color: #080a0e;       /* Fades any extra height seamlessly into the dark aesthetic */
      background-position: center;
      filter: brightness(0.55) saturate(0.85)
    }
    /* === GRADIENT OVERLAY === */
    /* .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,10,14,0.15) 0%,
        rgba(8,10,14,0.35) 38%,
        rgba(8,10,14,0.82) 68%,
        rgba(8,10,14,0.96) 100%
      );
    } */

    /* === CONTENT === */
    .content {
      height: 100%;
      width: 100%;
      align-content: center;
      position: relative;
      z-index: 2;
      padding: 0;
    }
    .content2 {
     display: flex;
     padding-top: 5px;
     padding-bottom: 5px
     
    }

    .top-bar {
      justify-content: flex-start;
      /* justify-content: space-between; */
      align-items: center;
padding-bottom: 4px;    
}

    .date-label {
      font-size: 12px;
      white-space: nowrap;
      /* letter-spacing: 0.14em; */
      text-transform: uppercase;
      text-align:start;
      color: rgba(190,210,235,0.9);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 8.5px;
      color: rgba(190,210,235,0.35);
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #7eb8d4;
      opacity: 0.8;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 0.8; transform: scale(1); }
      50%      { opacity: 0.25; transform: scale(0.65); }
    }

    .time-block {
      height: 100%;
      align-items: center;
      padding: 8px 22px 6px;
    }

    .eyebrow {
      font-size: 9px;
      white-space: nowrap;
      padding-top: 4px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(130,175,210,0.8);
      margin-bottom: 3px;
    }

    .total-time {
      font-family: 'Montserrat', serif;
      font-weight: 300;
      font-size: 52px;
      white-space: nowrap;
      padding-top: 12px;
      padding-bottom: 12px;
      color: #d6eaf5;
      line-height: 1;
      letter-spacing: -0.025em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }

    .div {
      height: 1px;
      margin: 10px 22px;
      background: rgba(120,170,200,0.12);
    }

    .app-list {
      padding: 0 22px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .app-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-name {
      font-size: 10px;
      color: rgba(210,230,245,0.82);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      letter-spacing: 0.01em;
    }

    .app-dur {
      font-size: 9.5px;
      color: rgba(130,190,220,0.75);
      flex-shrink: 0;
    }

    .bar-track {
      height: 1.5px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 1px;
      background: linear-gradient(90deg, rgba(120,185,220,0.85), rgba(80,150,200,0.25));
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }

    .footer {
      margin-top: 14px;
      padding: 0 22px 18px;
      display: flex;
      justify-content: space-between;
    }

    .aw-tag { font-size: 8px; color: rgba(255,255,255,0.12); letter-spacing: 0.05em; }
    .updated { font-size: 12px; color: rgba(255,255,255,0.4); padding-left: 6px; }

    .state-msg { font-size: 10px; color: rgba(255,100,100,0.8); padding: 10px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content">
      <div class = "content2">

     

      <div class="time-block">
         <div class="top-bar">
           <span class="date-label" id="date-str"></span>
          </div>
          <div class="eyebrow">Screen Time Today</div>
          <div class="total-time" id="total-time">—</div>
          <span class="updated" id="updated"></span>
      </div>

      <div class="div"></div>

      <div class="app-list" id="app-list">
        <div class="state-msg" style="color: rgba(130,185,220,0.4);">connecting…</div>
      </div>

      
    </div>
      </div>

  </div>

  <script>
    const BASE = 'http://127.0.0.1:5600';
    
    function fmt(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (h > 0) return h + 'h ' + m + 'm';
      if (m > 0) return m + 'm';
      return Math.floor(sec) + 's';
    }

    function dateLabel() {
      return new Date().toLocaleDateString('en-IN', {
        weekday:'short', day:'numeric', month:'short'
      }).toUpperCase();
    }

    function timeStr() {
      const d = new Date();
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    async function getEvents() {
      const r = await fetch(BASE + '/api/0/buckets');
      const buckets = await r.json();
      const keys = Object.keys(buckets);
      const winBucket = keys.find(k => k.startsWith('aw-watcher-window'));
      if (!winBucket) throw new Error('No window bucket found');

      const now = new Date();
      const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
      const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();

      // 3. Fetch raw event data directly
      const url = `${BASE}/api/0/buckets/${winBucket}/events?start=${startOfDay}&end=${endOfDay}`;
      const res = await fetch(url);
      const rawEvents = await res.json();

      // 4. Manually group and calculate app times
    // 4. Manually group and calculate app times (Smart Parser)
      const appTotals = {};
      for (let ev of rawEvents) {
        let rawApp = (ev.data && ev.data.app ? ev.data.app : 'Unknown').replace(/\.exe$/i, '');
        let rawTitle = ev.data && ev.data.title ? ev.data.title : '';
        
        let finalName = rawApp;

        // Clean up web browsers
        if (rawApp.toLowerCase() === 'chrome' || rawApp.toLowerCase() === 'msedge' || rawApp.toLowerCase() === 'firefox') {
            let parts = rawTitle.split(' - '); 
            let splitTitle = parts[0]; 
            finalName = splitTitle.replace(/^\(\d+\)\s*/, '').trim(); 
            
            // --- NEW: Special rule for Gemini ---
            if (finalName.includes('Google Gemini') && parts.length > 1) {
                // This will output "Gemini: Customizing PC with Minimalist Icons"
                finalName = 'Gemini: ' + parts[1].trim(); 
            }

            if (!finalName || finalName === 'New Tab') finalName = 'Browsing';
        } 
        // Clean up VS Code
        else if (rawApp.toLowerCase() === 'code') {
            finalName = 'VS Code';
        }
        // Clean up File Explorer
        else if (rawApp.toLowerCase() === 'explorer') {
            finalName = 'File Explorer';
        }

        if (!appTotals[finalName]) appTotals[finalName] = 0;
        appTotals[finalName] += ev.duration;
      }
      // 5. Convert to sorted array
      let sortedEvents = [];
      for (let app in appTotals) {
        sortedEvents.push({ app: app, duration: appTotals[app] });
      }
      sortedEvents.sort((a, b) => b.duration - a.duration);

      return sortedEvents;
    }

    async function update() {
      document.getElementById('date-str').textContent = dateLabel();
      try {
        const events = await getEvents();
        if (!events || !events.length) {
          document.getElementById('total-time').textContent = '0m';
          document.getElementById('app-list').innerHTML = '<div class="state-msg" style="color: rgba(130,185,220,0.4);">no data yet</div>';
          document.getElementById('updated').textContent = timeStr();
          return;
        }

        const total = events.reduce((s, e) => s + e.duration, 0);
        document.getElementById('total-time').textContent = fmt(total);

        const top = events.slice(0, 6);
        const max = top[0].duration;

        document.getElementById('app-list').innerHTML = top.map(ev => {
          const pct  = Math.max(5, Math.round((ev.duration / max) * 100));
          return '<div class="app-row">' +
            '<div class="app-meta">' +
              '<span class="app-name">' + ev.app + '</span>' +
              '<span class="app-dur">' + fmt(ev.duration) + '</span>' +
            '</div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
          '</div>';
        }).join('');

        document.getElementById('updated').textContent = timeStr();
      } catch(err) {
        document.getElementById('total-time').textContent = '—';
        document.getElementById('app-list').innerHTML = '<div class="state-msg">Connection blocked or AW is closed</div>';
      }
    }

    update();
    setInterval(update, 60000);
  </script>
</body>
</html>
